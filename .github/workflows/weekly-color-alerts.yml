name: Weekly Google Alerts Update for Color

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 1 * * 0'  # 每週日 UTC 01:00（台灣時間週日早上 09:00）
  workflow_dispatch:     # 允許你手動在 GitHub Actions 頁面觸發測試

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Fetch and parse RSS to JSON
        run: |
          python - <<EOF
          import feedparser
          import json
          import os

          feed_url = "https://www.google.com/alerts/feeds/16676562592338289988/16796024816747426133"
          feed = feedparser.parse(feed_url)

          items = []
          for entry in feed.entries[:10]:  # 只取最新 10 筆避免過多
              item = {
                  "title": entry.get("title", "No title"),
                  "link": entry.get("link", "#"),
                  "published": entry.get("published", entry.get("updated", "No date")),
                  "description": entry.get("summary", entry.get("description", "No description"))[:300] + "..." if entry.get("summary") or entry.get("description") else "No snippet"
              }
              items.append(item)

          os.makedirs('_data/alerts', exist_ok=True)
          with open('_data/alerts/color_alerts.json', 'w', encoding='utf-8') as f:
              json.dump({"items": items, "updated": feed.get("updated", "No update time")}, f, ensure_ascii=False, indent=2)
          EOF

      - name: Commit changes if any
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: Auto update weekly color alerts from Google RSS
          file_pattern: _data/alerts/color_alerts.json
