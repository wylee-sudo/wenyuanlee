name: Color Alert
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
      - name: Set up Python 3.12
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install feedparser requests
      - name: Fetch and parse RSS to JSON
        run: |
          python - <<EOF
          import feedparser
          import json
          import os
          from urllib.parse import urlparse, parse_qs

          os.makedirs('alerts-data', exist_ok=True)

          # --- Google Alerts ---
          feed_url = "https://www.google.com/alerts/feeds/16676562592338289988/16796024816747426133"
          feed = feedparser.parse(feed_url)
          items = []
          for entry in feed.entries[:10]:
              link = entry.get("link", "#")
              original_link = link
              if "google.com/url" in link:
                  parsed = urlparse(link)
                  qs = parse_qs(parsed.query)
                  if 'url' in qs and qs['url']:
                      original_link = qs['url'][0]
              items.append({
                  "title": entry.get("title", "No title"),
                  "link": original_link,
                  "published": entry.get("published", entry.get("updated", "No date")),
                  "description": (entry.get("summary") or entry.get("description") or "No snippet")[:300] + "..."
              })
          with open('alerts-data/color_alerts.json', 'w', encoding='utf-8') as f:
              json.dump({
                  "items": items,
                  "updated": feed.get("updated", "No update time")
              }, f, ensure_ascii=False, indent=2)

          # --- 學術期刊 RSS ---
          journals = {
              "journal_color_research": {
                  "url": "https://onlinelibrary.wiley.com/feed/15206378/most-recent",
                  "name": "Color Research & Application"
              },
              "journal_coloration_technology": {
                  "url": "https://onlinelibrary.wiley.com/feed/14784408/most-recent",
                  "name": "Coloration Technology"
              }
          }
          for key, info in journals.items():
              feed = feedparser.parse(info["url"])
              items = []
              for entry in feed.entries[:10]:
                  items.append({
                      "title": entry.get("title", "No title"),
                      "link": entry.get("link", "#"),
                      "published": entry.get("published", entry.get("updated", "No date")),
                      "description": (entry.get("summary") or entry.get("description") or "No snippet")[:300] + "..."
                  })
              with open(f'alerts-data/{key}.json', 'w', encoding='utf-8') as f:
                  json.dump({
                      "journal": info["name"],
                      "items": items,
                      "updated": feed.get("updated", "No update time")
                  }, f, ensure_ascii=False, indent=2)
          EOF
      - name: Commit changes if any
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: Auto update color alerts and journal RSS
          file_pattern: alerts-data/*.json
